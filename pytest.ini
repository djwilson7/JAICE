[pytest]
testpaths =
    tests/backend
    client_api/services/resume_chat/test_service.py
pythonpath = .
asyncio_mode = auto
addopts =
    --strict-markers
    -p no:cacheprovider
    --cov=client_api
    --cov=common
    --cov=shared_worker_library
    --cov=classification
    --cov=gmail
    --cov=ner
    --cov=relevance
    --cov-branch
    --cov-report=term-missing
    --cov-report=json
