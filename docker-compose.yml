services:
  # Our Redis Service for managing the message queues
  redis:
    container_name: redis
    image: redis:7-alpine
    ports:
      - "6379:6379"

  # Our FastAPI backend service
  client_api:
    container_name: client_api
    build:
      context: .
      dockerfile: ./client_api/Dockerfile.client_api
    command: >
      uvicorn client_api.main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir /app/client_api --reload-dir /app/common --reload-dir /app/OpenAI
    env_file:
      - .env
    environment:
      RESUME_LLM_PROVIDER: ${RESUME_LLM_PROVIDER:-ollama}
      RESUME_LLM_MODEL: ${RESUME_LLM_MODEL:-qwen2.5:1.5b}
      RESUME_LLM_TIMEOUT_SECONDS: ${RESUME_LLM_TIMEOUT_SECONDS:-60}
      RESUME_REWRITE_NUM_CTX: ${RESUME_REWRITE_NUM_CTX:-1536}
      RESUME_REWRITE_NUM_PREDICT: ${RESUME_REWRITE_NUM_PREDICT:-450}
      RESUME_REWRITE_TEMPERATURE: ${RESUME_REWRITE_TEMPERATURE:-0.05}
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://local_llm:11434}
      RESUME_PDF_DEBUG_DIR: ${RESUME_PDF_DEBUG_DIR:-/tmp/jaice-resume-pdf-debug}
      RESUME_PDF_DEBUG_HOST_DIR: ${RESUME_PDF_DEBUG_HOST_DIR:-./scratch/resume-pdf-debug}
    ports:
      - "8000:8000"
    volumes:
      - ./client_api:/app/client_api
      - ./common:/app/common
      - ./OpenAI:/app/OpenAI
      - ./scratch/resume-pdf-debug:/tmp/jaice-resume-pdf-debug
    depends_on:
      redis:
        condition: service_started

  gmail_request_intake:
    container_name: gmail_request_intake
    build:
      context: .
      dockerfile: ./gmail/Dockerfile.gmail
    command: >
      watchmedo auto-restart --directory=/app/gmail --directory=/app/shared_worker_library
      --directory=/app/common --patterns=*.py --recursive --
      celery -A gmail.gmail_worker worker -Q gmail_initial_sync_queue -l info -n request_intake -c ${GMAIL_INTAKE_CONCURRENCY:-2}
    env_file:
      - .env
    volumes:
      - ./gmail:/app/gmail
      - ./shared_worker_library:/app/shared_worker_library
      - ./common:/app/common
    depends_on:
      - redis

  gmail_fetch_content:
    container_name: gmail_fetch_content
    build:
      context: .
      dockerfile: ./gmail/Dockerfile.gmail
    command: >
      watchmedo auto-restart --directory=/app/gmail --directory=/app/shared_worker_library
      --directory=/app/common --patterns=*.py --recursive --
      celery -A gmail.gmail_worker worker -Q gmail_fetch_content_queue -l info -n fetch_content -c ${GMAIL_FETCH_CONCURRENCY:-4}
    env_file:
      - .env
    volumes:
      - ./gmail:/app/gmail
      - ./shared_worker_library:/app/shared_worker_library
      - ./common:/app/common
    depends_on:
      - redis

  gmail_pubsub_listener:
    container_name: gmail_pubsub_listener
    build:
      context: .
      dockerfile: ./gmail/Dockerfile.gmail
    command: >
      watchmedo auto-restart --directory=/app/gmail --directory=/app/shared_worker_library
      --directory=/app/common --patterns=*.py --recursive --
      python -m gmail.pubsub_listener
    env_file:
      - .env
    environment:
      GOOGLE_APPLICATION_CREDENTIALS: /app/gcp/credentials.json
    volumes:
      - ./gmail:/app/gmail
      - ./shared_worker_library:/app/shared_worker_library
      - ./common:/app/common
      - ${GMAIL_PUBSUB_CREDENTIALS_HOST:-./scratch/gmail-pubsub-credentials.json}:/app/gcp/credentials.json:ro
    depends_on:
      - redis

  relevance_worker:
    container_name: relevance_worker
    build:
      context: .
      dockerfile: ./relevance/Dockerfile.relevance
    command: >
      watchmedo auto-restart --directory=/app/relevance --directory=/app/shared_worker_library
      --directory=/app/common --patterns=*.py --recursive --
      celery -A relevance.relevance_worker worker -Q relevance_model_queue -l info -E -n relevance_model -c 3
    env_file:
      - .env
    volumes:
      - ./relevance:/app/relevance
      - ./shared_worker_library:/app/shared_worker_library
      - ./common:/app/common
    depends_on:
      - redis

  classification_worker:
    container_name: classification_worker
    build:
      context: .
      dockerfile: ./classification/Dockerfile.classification
    command: >
      watchmedo auto-restart --directory=/app/classification --directory=/app/shared_worker_library
      --directory=/app/common --patterns=*.py --recursive --
      celery -A classification.class_worker worker -Q classification_model_queue -l info -E -n classification_model -c 1
    env_file:
      - .env
    volumes:
      - ./classification:/app/classification
      - ./shared_worker_library:/app/shared_worker_library
      - ./common:/app/common
    depends_on:
      - redis

  ner_worker:
    container_name: ner_worker
    build:
      context: .
      dockerfile: ./ner/Dockerfile.ner
    command: >
      watchmedo auto-restart --directory=/app/ner --directory=/app/shared_worker_library
      --directory=/app/common --patterns=*.py --recursive --
      celery -A ner.ner_worker worker -Q ner_model_queue -l info -E -n ner_model -c 2
    env_file:
      - .env
    volumes:
      - ./ner:/app/ner
      - ./shared_worker_library:/app/shared_worker_library
      - ./common:/app/common
    depends_on:
      - redis

  # Flower monitoring tool for Celery
  flower:
    container_name: flower_monitor
    image: mher/flower:2.0.1
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    ports:
      - "5555:5555"
    depends_on:
      - redis

  local_llm:
    container_name: local_llm
    image: ollama/ollama:0.5.7
    ports:
      - "11434:11434"
    volumes:
      - local_llm_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 10s

  local_llm_model_loader:
    container_name: local_llm_model_loader
    image: ollama/ollama:0.5.7
    command: ["pull", "${RESUME_LLM_MODEL:-qwen2.5:1.5b}"]
    volumes:
      - local_llm_data:/root/.ollama
    environment:
      OLLAMA_HOST: http://local_llm:11434
    depends_on:
      local_llm:
        condition: service_healthy
    restart: "no"

volumes:
  local_llm_data:
